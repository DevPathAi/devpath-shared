name: devpath-local

# DevPath AI 로컬 개발 인프라.
# 사용: docker compose up -d
# 자격증명은 로컬 개발 전용이다. 스테이징/프로덕션 값은 절대 커밋하지 않는다.

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: devpath
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: devpath
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "devpath"]
      interval: 10s
      retries: 5

  postgres-vector:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: devpath
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: devpath_vector
    ports:
      - "5433:5432"
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "devpath"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"

  kafka:
    image: apache/kafka:3.9.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

volumes:
  postgres-data:
  pgvector-data:
